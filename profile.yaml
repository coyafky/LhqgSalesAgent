retrieval:
  top_k: 5
  require_source_page_for:
    - 参数
    - 质保
    - 厚度
    - 阻隔率
    - 售后
generation:
  vehicle_wrap_preview_skill: ark-seedream-car-preview
  image_provider: provider_chain
  image_model: gpt-image-2-all
  default_size: auto
  quality: high
  response_format: b64_json
  provider_chain:
    - 4sapi_primary
    - apiyi_primary
    - xinghu_third
    - relay_backup
  provider_overrides:
    xinghu_third:
      model: gpt-image-2
      request_style: refs_array
      response_format: url
      watermark: true
  color_asset_library: skills/ark-seedream-car-preview/references/color_assets.json
guardrails:
  - 不回答实时价格、活动、库存、施工排期，提示以门店最新政策为准。
  - 不承诺手册中没有写明的质保、效果或售后责任。
  - 生成改色预览图时只改变车身贴膜覆盖区域，不改变车型、轮毂、车灯、车牌、背景和光影。
  - 改色预览图交付必须保持客户原始车辆照片的宽高比例；像素尺寸可由生图 provider 自适应，但禁止输出方图或其他错误比例。
  - 改色生图必须走客户车型图 + 资产库 preview 色卡图 + OpenAI-compatible provider chain；color.hex 和 Lab 只作为辅助标注，禁止回退到纯 HEX/Lab 数值生图。

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">有膜有漾 Sales Agent 工作操作系统总览</title>
  <desc id="desc">从客户沟通到 CRM、跟进、成交、售后和店长复盘的完整销售工作流架构图。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f4858"/>
    </marker>
    <style>
      .bg{fill:#f7f8f5}.title{font:700 34px "PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#1e2a32}.sub{font:16px "PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#52616b}
      .band{fill:#ffffff;stroke:#d8ded8;stroke-width:1.5}.node{fill:#fff;stroke:#78909c;stroke-width:1.5}.accent{fill:#e8f3ef;stroke:#2f6f5e}.ops{fill:#fff3de;stroke:#bb7b23}.data{fill:#eef1f8;stroke:#5568a6}
      .label{font:700 18px "PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#263238}.small{font:14px "PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#455a64}.tiny{font:12px "PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#607d8b}
      .line{stroke:#2f4858;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke:#8a9aa3;stroke-width:1.5;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="64" y="68">有膜有漾 Sales Agent 工作操作系统</text>
  <text class="sub" x="64" y="100">Agent 不是被动答疑工具，而是嵌入销售日常：获客、诊断、推荐、记录、跟进、复盘。</text>

  <rect class="band" x="64" y="135" width="1152" height="105" rx="10"/>
  <text class="label" x="92" y="174">销售入口</text>
  <rect class="node" x="220" y="158" width="170" height="56" rx="8"/><text class="small" x="245" y="192">自然语言消息</text>
  <rect class="node" x="430" y="158" width="170" height="56" rx="8"/><text class="small" x="458" y="192">客户聊天截图</text>
  <rect class="node" x="640" y="158" width="170" height="56" rx="8"/><text class="small" x="665" y="192">车辆照片/色号</text>
  <rect class="node" x="850" y="158" width="170" height="56" rx="8"/><text class="small" x="880" y="192">店长分析指令</text>

  <rect class="accent" x="430" y="290" width="420" height="96" rx="12"/>
  <text class="label" x="526" y="326">意图识别与工作流路由</text>
  <text class="small" x="472" y="356">判断是咨询、推荐、CRM、跟进、售后、复盘还是改色预览</text>

  <path class="line" d="M305 214 C305 260 500 250 560 290"/>
  <path class="line" d="M515 214 C515 250 570 258 610 290"/>
  <path class="line" d="M725 214 C725 250 700 260 680 290"/>
  <path class="line" d="M935 214 C935 270 790 260 720 290"/>

  <rect class="band" x="64" y="445" width="1152" height="160" rx="10"/>
  <text class="label" x="92" y="482">核心工作流</text>
  <rect class="node" x="190" y="508" width="130" height="58" rx="8"/><text class="small" x="215" y="532">产品知识</text><text class="tiny" x="214" y="552">查证与推荐</text>
  <rect class="node" x="340" y="508" width="130" height="58" rx="8"/><text class="small" x="365" y="532">接待诊断</text><text class="tiny" x="365" y="552">SPIN 提问</text>
  <rect class="node" x="490" y="508" width="130" height="58" rx="8"/><text class="small" x="515" y="532">CRM 记录</text><text class="tiny" x="515" y="552">飞书表写入</text>
  <rect class="node" x="640" y="508" width="130" height="58" rx="8"/><text class="small" x="665" y="532">异议成交</text><text class="tiny" x="666" y="552">同理与推进</text>
  <rect class="node" x="790" y="508" width="130" height="58" rx="8"/><text class="small" x="815" y="532">跟进售后</text><text class="tiny" x="816" y="552">提醒与复盘</text>
  <rect class="node" x="940" y="508" width="130" height="58" rx="8"/><text class="small" x="963" y="532">店长分析</text><text class="tiny" x="963" y="552">漏斗与团队</text>

  <path class="line" d="M640 386 L640 430 L255 430 L255 508"/>
  <path class="line" d="M640 386 L640 430 L405 430 L405 508"/>
  <path class="line" d="M640 386 L640 508"/>
  <path class="line" d="M640 430 L705 430 L705 508"/>
  <path class="line" d="M640 430 L855 430 L855 508"/>
  <path class="line" d="M640 430 L1005 430 L1005 508"/>

  <rect class="data" x="100" y="650" width="270" height="58" rx="8"/><text class="small" x="126" y="675">知识库：产品、FAQ、售后政策</text><text class="tiny" x="126" y="696">RAG 检索，带来源与边界</text>
  <rect class="data" x="505" y="650" width="270" height="58" rx="8"/><text class="small" x="536" y="675">CRM：客户、跟进、成交数据</text><text class="tiny" x="536" y="696">自然语言结构化后写入飞书</text>
  <rect class="data" x="910" y="650" width="270" height="58" rx="8"/><text class="small" x="944" y="675">运营看板：日报、周报、月报</text><text class="tiny" x="944" y="696">店长复盘与团队动作建议</text>

  <path class="dash" d="M255 566 C230 600 225 620 235 650"/>
  <path class="dash" d="M555 566 L620 650"/>
  <path class="dash" d="M1005 566 C1035 600 1045 620 1045 650"/>
</svg>

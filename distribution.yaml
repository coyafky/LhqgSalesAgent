name: LhqgSalesAgent
version: 0.3.0
description: "有膜有漾内部销售助手：CRM全链路 + 产品知识库 + 销售话术 + 车膜改色预览"
hermes_requires: ">=0.12.0"
author: "有膜有漾"
license: "Private"

env_requires:
  - name: DEEPSEEK_API_KEY
    description: "DeepSeek 模型 API 密钥（主模型）"
    required: true
    default: ""
  - name: FEISHU_APP_ID
    description: "飞书应用 App ID（CRM 必需）"
    required: true
    default: ""
  - name: FEISHU_APP_SECRET
    description: "飞书应用 App Secret（CRM 必需）"
    required: true
    default: ""
  - name: WRAP_PROVIDER_CHAIN
    description: "车膜改色生图 provider 顺序"
    required: false
    default: "4sapi_primary,apiyi_primary,xinghu_third,relay_backup"
  - name: WRAP_PROVIDER_4SAPI_PRIMARY_API_KEY
    description: "4sapi 生图 API key"
    required: false
    default: ""
  - name: WRAP_PROVIDER_APIYI_PRIMARY_API_KEY
    description: "APIYi 生图 API key"
    required: false
    default: ""
  - name: WRAP_PROVIDER_XINGHU_THIRD_API_KEY
    description: "星狐生图 API key"
    required: false
    default: ""

distribution_owned:
  - distribution.yaml
  - README.md
  - SOUL.md
  - profile.yaml
  - config.yaml
  - .env.EXAMPLE
  - .gitignore
  - skills/
  - workspace/
  - cron/
  - scripts/
